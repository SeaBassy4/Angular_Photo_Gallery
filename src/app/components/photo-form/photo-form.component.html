<form [formGroup]="photoForm" (ngSubmit)="onSubmit()" class="photo-form glass-panel">
  <h2>Add New Photo</h2>
  
  <div class="form-group">
    <label for="url">Image URL</label>
    <input id="url" type="url" formControlName="url" placeholder="https://..."
           [class.invalid]="photoForm.get('url')?.invalid && photoForm.get('url')?.touched">
    <div class="error-msg" *ngIf="photoForm.get('url')?.invalid && photoForm.get('url')?.touched">
      Please enter a valid URL starting with http:// or https://.
    </div>
  </div>

  <div class="form-group">
    <label for="title">Title</label>
    <input id="title" type="text" formControlName="title" placeholder="add a title to your image..."
           [class.invalid]="photoForm.get('title')?.invalid && photoForm.get('title')?.touched">
    <div class="error-msg" *ngIf="photoForm.get('title')?.invalid && photoForm.get('title')?.touched">
      Title must be at least 3 characters.
    </div>
  </div>

  <button type="submit" [disabled]="photoForm.invalid" class="btn-primary">Add Photo</button>
</form>
