<div class="photo-card">
  <div class="image-wrapper">
    <img [src]="photo.url" [alt]="photo.title" loading="lazy">
    <div class="overlay">
      <button class="delete-btn" (click)="onDelete()" aria-label="Delete photo" title="Delete">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
      </button>
    </div>
  </div>
  
  <div class="card-content">
    <h3 class="photo-title" [title]="photo.title">{{ photo.title }}</h3>
    <button class="like-btn" (click)="onLike()" [class.liked]="photo.likes > 0">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" [attr.fill]="photo.likes > 0 ? 'currentColor' : 'none'" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="heart-icon"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
      <span class="like-count">{{ photo.likes }}</span>
    </button>
  </div>
</div>
